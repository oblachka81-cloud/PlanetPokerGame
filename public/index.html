<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#080808">
    <title>Planet Poker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/base.css">
    <style>
        .splash {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 24px;
            text-align: center;
        }

        .splash-emblem {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--gold-light), var(--gold-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            box-shadow: var(--shadow-gold), var(--shadow-deep);
            margin-bottom: 28px;
            animation: pulse-gold 3s ease infinite;
        }

        .splash-title {
            font-family: var(--font-serif);
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .splash-sub {
            font-size: 11px;
            font-weight: 700;
            color: var(--platinum-dim);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 48px;
        }

        .splash-features {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 48px;
        }

        .feature-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            padding: 12px 16px;
        }

        .feature-icon {
            font-size: 20px;
            width: 28px;
            text-align: center;
            flex-shrink: 0;
        }

        .feature-text {
            font-size: 13px;
            color: var(--platinum-dim);
            text-align: left;
        }

        .feature-text strong {
            color: var(--platinum);
            font-weight: 600;
        }

        .splash-btn-wrap {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-start {
            width: 100%;
            padding: 18px;
            font-size: 17px;
            font-weight: 800;
            letter-spacing: 0.05em;
            border-radius: var(--r-xl);
        }

        .splash-footer {
            margin-top: 32px;
            font-size: 11px;
            color: var(--platinum-dim);
            opacity: 0.5;
        }

        .splash-emblem {
            animation: fadeIn 0.4s ease 0.1s both, pulse-gold 3s ease 0.5s infinite;
        }

        .splash-title {
            animation: fadeIn 0.4s ease 0.2s both;
        }

        .splash-sub {
            animation: fadeIn 0.4s ease 0.3s both;
        }

        .splash-features {
            animation: fadeIn 0.4s ease 0.4s both;
        }

        .splash-btn-wrap {
            animation: fadeIn 0.4s ease 0.5s both;
        }
    </style>
</head>
<body>
    <div class="splash">
        <div class="splash-emblem">🂡</div>
        <h1 class="splash-title">Planet Poker</h1>
        <p class="splash-sub">Texas Hold'em · Sit &amp; Go</p>

        <div class="splash-features">
            <div class="feature-row">
                <span class="feature-icon">♠️</span>
                <span class="feature-text"><strong>Бесплатные столы</strong> — играй без взносов</span>
            </div>
            <div class="feature-row">
                <span class="feature-icon">⭐</span>
                <span class="feature-text"><strong>Турниры за Stars</strong> — Sit &amp; Go в любой момент</span>
            </div>
            <div class="feature-row">
                <span class="feature-icon">💎</span>
                <span class="feature-text"><strong>TON-токены</strong> — награды за игру</span>
            </div>
            <div class="feature-row">
                <span class="feature-icon">🌍</span>
                <span class="feature-text"><strong>Мультиплеер</strong> — против реальных игроков</span>
            </div>
        </div>

        <div class="splash-btn-wrap">
            <button class="btn btn-primary btn-start" id="btnEnter">Войти в лобби</button>
        </div>

        <p class="splash-footer">Planet Poker · v0.1</p>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.setHeaderColor('#080808');
            tg.setBackgroundColor('#080808');
        }

        document.getElementById('btnEnter').addEventListener('click', () => {
            window.location.href = 'lobby.html';
        });
    </script>
</body>
</html>
