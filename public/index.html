<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Planet Poker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }

        .welcome {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px 25px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,215,0,0.3);
        }

        .logo span {
            font-size: 70px;
            display: inline-block;
            animation: bounce 2s ease infinite;
        }

        .logo h1 {
            color: #ffd700;
            font-size: 32px;
            margin-top: 10px;
        }

        .info {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin: 30px 0;
        }

        .info p {
            color: white;
            font-size: 18px;
            margin: 8px 0;
        }

        .info strong {
            color: #ffd700;
        }

        button {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            color: #1a472a;
            font-size: 22px;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 50px;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 20px;
        }

        button:active {
            transform: scale(0.97);
        }

        details {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 12px;
            text-align: left;
        }

        summary {
            color: #ffd700;
            font-weight: bold;
            cursor: pointer;
        }

        details p {
            color: #ddd;
            margin-top: 10px;
            font-size: 14px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="welcome">
        <div class="logo">
            <span>🃏</span>
            <h1>PLANET POKER</h1>
        </div>

        <div class="info">
            <p>💰 Начальный банк: <strong>1000 фишек</strong></p>
            <p>🎴 Техасский Холдем</p>
        </div>

        <button id="startBtn">▶ СТАРТ ИГРЫ</button>

        <details>
            <summary>📖 Правила (кратко)</summary>
            <p>1. Каждому игроку по 2 карты<br>
            2. 5 общих карт на столе<br>
            3. Собери лучшую комбинацию<br>
            4. Побеждает старшая</p>
        </details>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) tg.expand();

        document.getElementById('startBtn').addEventListener('click', () => {
            alert('Игровой стол скоро появится');
        });
    </script>
</body>
</html>
