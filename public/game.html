<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#080808">
    <title>Planet Poker — Стол</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <div class="game-wrap" id="gameWrap">
        <!-- СТАТУС БАР -->
        <div class="game-status-bar">
            <span class="game-status-round" id="statusRound">Ожидание...</span>
            <span class="game-status-players" id="statusPlayers"></span>
        </div>

        <!-- ПОКЕРНЫЙ СТОЛ -->
        <div class="poker-table-wrap">
            <div class="poker-table" id="pokerTable">
                <!-- МЕСТА ИГРОКОВ (генерируются JS) -->
                <div id="seats"></div>

                <!-- ОБЩИЕ КАРТЫ -->
                <div class="community-cards" id="communityCards"></div>

                <!-- БАНК -->
                <div class="pot-display">
                    <div class="pot-label">Банк</div>
                    <div class="pot-amount" id="potAmount">0</div>
                </div>
            </div>
        </div>

        <!-- ЛОГ ДЕЙСТВИЙ -->
        <div class="action-log" id="actionLog"></div>

        <!-- ПАНЕЛЬ ИГРОКА -->
        <div class="player-panel" id="playerPanel">
            <!-- КАРТЫ В РУКЕ -->
            <div class="player-hand">
                <div class="hand-cards" id="handCards">
                    <div class="card back hand-card"></div>
                    <div class="card back hand-card"></div>
                </div>
                <div class="hand-strength" id="handStrength"></div>
            </div>

            <!-- СЛАЙДЕР РЕЙЗА -->
            <div class="raise-wrap" id="raiseWrap">
                <input type="range" class="raise-slider" id="raiseSlider" min="0" max="100" value="50">
                <span class="raise-amount" id="raiseAmount">0</span>
            </div>

            <!-- КНОПКИ ДЕЙСТВИЙ -->
            <div class="action-buttons" id="actionButtons">
                <button class="btn btn-fold" id="btnFold" disabled>Fold</button>
                <button class="btn btn-check" id="btnCheck" disabled>Check</button>
                <button class="btn btn-call" id="btnCall" disabled>Call</button>
                <button class="btn btn-raise" id="btnRaise" disabled>Raise</button>
                <button class="btn btn-allin" id="btnAllIn" disabled>All-In</button>
            </div>
        </div>

        <!-- OVERLAY: РЕЗУЛЬТАТ РАУНДА -->
        <div class="round-result" id="roundResult" style="display:none">
            <div class="round-result-card">
                <div class="round-result-title" id="roundResultTitle">Победа!</div>
                <div class="round-result-hand" id="roundResultHand"></div>
                <div class="round-result-amount" id="roundResultAmount"></div>
            </div>
        </div>

        <!-- OVERLAY: ИТОГИ ТУРНИРА -->
        <div class="tournament-end" id="tournamentEnd" style="display:none">
            <div class="tournament-end-title" id="tournamentTitle">Турнир завершён</div>
            <div class="tournament-end-place" id="tournamentPlace">🥇</div>
            <div class="tournament-end-prize" id="tournamentPrize"></div>
            <button class="btn btn-primary" id="btnBackLobby" style="width:100%;max-width:280px">
                Вернуться в лобби
            </button>
        </div>

        <!-- OVERLAY: ОЖИДАНИЕ -->
        <div class="waiting-overlay" id="waitingOverlay">
            <div class="loader"></div>
            <div class="waiting-overlay-text">Подключение к столу...</div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/tg.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
